<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戀財娛樂館 - Scatter n Gold Proposal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'Noto Serif TC', 'sans-serif'],
                        serif: ['Noto Serif TC', 'serif'],
                    },
                    colors: {
                        mainBg: '#09151A',
                        contentBg: '#0D2129',
                        nileTeal: '#1F4F5F',
                        pharaohGold: '#D4AF37',
                        rubyCrimson: '#C21E56',
                        textGray: '#A7BFC7'
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hover-scale { transition: transform 0.3s ease; }
        .hover-scale:hover { transform: scale(1.02); }
        
        .logo-enhanced {
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6));
            transition: all 0.5s ease;
        }
        
        .nav-indicator {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .text-gold-gradient {
            background: linear-gradient(to bottom, #D4AF37, #FFF2CD, #D4AF37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 滾動登場動畫 */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1s ease-out, transform 1s ease-out;
            will-change: opacity, transform;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Hero 佈局核心：使用比例高度與直角邊框 */
        .hero-layout-wrap {
            position: relative;
            min-height: 35vw; /* 高度隨寬度比例縮放，確保大氣感不因縮放消失 */
            max-height: 600px;
            overflow: hidden; 
            background: linear-gradient(135deg, #1F4F5F 0%, #0D2129 100%);
            border-radius: 0; 
            display: flex;
            align-items: center;
        }

        /* 右側繞流控制區 */
        .hero-logo-float-area {
            position: absolute;
            right: 0;
            top: 0;
            width: 40%; 
            height: 100%;
            z-index: 20;
            /* 讓文字順著眼睛邊緣繞行 */
            shape-outside: circle(40% at 100% 50%);
            float: right;
        }

        /* 眼睛 Logo：使用 vw 單位達成「按比例縮放」 */
        .hero-big-eye {
            position: absolute;
            /* 將牛哥設定的 750px 轉換為視窗比例 (約 52vw) */
            width: 52vw; 
            max-width: 800px;
            min-width: 400px;
            transform: rotate(-90deg); /* 保持直立朝上 */
            /* 將位移數值比例化，確保位置永遠卡在右側邊界 */
            right: -14vw; 
            top: 60%;
            transform-origin: center;
            translate: 0 -50%;
            filter: drop-shadow(-10px 15px 30px rgba(0,0,0,0.8));
            pointer-events: none;
        }

        @media (max-width: 1023px) {
            .hero-layout-wrap { min-height: 45vw; }
            .hero-big-eye { width: 60vw; right: -15vw; }
        }

        @media (max-width: 767px) {
            .hero-layout-wrap { min-height: 300px; display: block; }
            .hero-logo-float-area { display: none; }
            .hero-big-eye {
                width: 80vw;
                right: -20vw;
                top: 50%;
            }
        }
    </style>
</head>
<body class="bg-mainBg text-white font-sans overflow-x-hidden relative min-h-screen flex justify-center py-6 px-4 md:py-12 lg:py-20 lg:px-16 2xl:px-32">

    <!-- 背景裝飾 -->
    <div class="fixed -top-16 -right-16 w-64 h-64 bg-pharaohGold rounded-full z-0 opacity-10 blur-3xl"></div>
    <div class="fixed top-[20%] -left-16 w-48 h-48 bg-rubyCrimson rounded-full z-0 opacity-20 blur-2xl"></div>
    
    <div class="fixed left-8 top-12 hidden 2xl:flex flex-col items-center text-pharaohGold opacity-30 z-0">
        <span class="text-sm font-medium mb-16">03</span>
        <span class="text-sm font-medium -rotate-90 tracking-[0.3em] mt-12 whitespace-nowrap uppercase">Proposal</span>
    </div>

    <!-- 外部容器 -->
    <div class="w-full max-w-[1250px] relative z-10">
        
        <!-- 主要內容 UI 視窗 -->
        <div class="w-full bg-contentBg shadow-[0_40px_100px_rgba(0,0,0,0.9)] rounded-[32px] md:rounded-[40px] border border-nileTeal relative z-10 flex flex-col overflow-hidden">
            
            <!-- Header 頂部導覽 -->
            <header class="flex justify-between items-center px-6 py-4 md:px-10 md:py-10 bg-transparent relative z-50">
                <div class="flex-shrink-0">
                    <!-- Brand.png 保持放大比例 -->
                    <img src="https://scatterngold.vercel.app/images/Brand.png" alt="Brand Logo" class="h-16 md:h-32 w-auto object-contain logo-enhanced">
                </div>
                
                <nav class="hidden md:flex gap-6 lg:gap-14 items-center">
                    <a href="#about" class="flex flex-col items-center group">
                        <span class="text-sm lg:text-base font-bold text-white group-hover:text-pharaohGold transition mb-2 tracking-[0.1em] whitespace-nowrap uppercase">關於戀財</span>
                        <div class="nav-indicator w-8 h-1.5 bg-pharaohGold rounded-full shadow-[0_0_8px_rgba(212,175,55,0.5)]"></div>
                    </a>
                    <a href="#vi" class="flex flex-col items-center group">
                        <span class="text-sm lg:text-base font-medium text-textGray group-hover:text-white transition mb-2 tracking-[0.1em] whitespace-nowrap uppercase">VI識別</span>
                        <div class="nav-indicator w-2 h-2 bg-gray-700 rounded-full group-hover:bg-gray-500"></div>
                    </a>
                    <a href="#space" class="flex flex-col items-center group">
                        <span class="text-sm lg:text-base font-medium text-textGray group-hover:text-white transition mb-2 tracking-[0.1em] whitespace-nowrap uppercase">空間規劃</span>
                        <div class="nav-indicator w-2 h-2 bg-gray-700 rounded-full group-hover:bg-gray-500"></div>
                    </a>
                    <a href="#future" class="flex flex-col items-center group">
                        <span class="text-sm lg:text-base font-medium text-textGray group-hover:text-white transition mb-2 tracking-[0.1em] whitespace-nowrap uppercase">未來發展</span>
                        <div class="nav-indicator w-2 h-2 bg-gray-700 rounded-full group-hover:bg-gray-500"></div>
                    </a>
                </nav>

                <div class="md:hidden text-pharaohGold text-2xl"><i class="fa-solid fa-bars"></i></div>
                <div class="hidden lg:block w-10"></div>
            </header>

            <!-- Hero Section: 響應式比例、直角佈局 -->
            <section class="p-0 relative">
                <div class="hero-layout-wrap border border-pharaohGold/10">
                    
                    <!-- 右側繞流區塊 (Logo 在此) -->
                    <div class="hero-logo-float-area">
                        <img src="https://scatterngold.vercel.app/images/logo.png" alt="Scarab Ornament" class="hero-big-eye">
                    </div>
                    
                    <!-- 左側文字內容區 (精緻比例) -->
                    <div class="z-10 p-10 md:p-14 lg:p-20 reveal active relative">
                        <div class="flex items-center gap-3 mb-6">
                            <span class="w-10 h-[1px] bg-pharaohGold"></span>
                            <span class="text-pharaohGold text-[10px] md:text-xs tracking-[0.4em] uppercase font-bold text-nowrap">Exclusive Proposal</span>
                        </div>
                        
                        <h1 class="text-4xl md:text-5xl lg:text-6xl font-black mb-8 leading-[0.9] font-serif text-white uppercase italic tracking-tighter">
                            SCATTER ALL<br>
                            <span class="text-gold-gradient">THE TIME</span>
                        </h1>
                        
                        <div class="mb-10 space-y-6">
                            <h2 class="text-pharaohGold text-xl md:text-2xl font-bold tracking-[0.3em] leading-tight">
                                戀財有道、開眼最好
                            </h2>
                            <p class="text-textGray text-sm md:text-base leading-relaxed max-w-lg font-medium opacity-80">
                                古埃及文明神祕美學與當代奢華娛樂<br class="hidden md:block">完美融合的遊藝殿堂。
                            </p>
                        </div>

                        <div class="flex">
                            <a href="#about" class="group relative bg-pharaohGold hover:bg-[#B8962F] text-mainBg text-[10px] md:text-xs font-bold py-3.5 px-10 rounded-full shadow-[0_15px_30px_rgba(212,175,55,0.2)] transition-all hover:-translate-y-1 uppercase tracking-[0.2em] flex items-center gap-3">
                                開始探索
                                <i class="fa-solid fa-chevron-down text-[8px] group-hover:translate-y-1 transition-transform"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 內容區塊維持高品質呈現 -->
            <div class="flex flex-col gap-16 md:gap-24 py-12 md:py-20">
                <section id="about" class="px-6 md:px-10 scroll-mt-20 reveal">
                    <div class="flex flex-col lg:flex-row gap-12 items-center">
                        <div class="lg:w-1/2">
                            <div class="bg-nileTeal/30 border border-pharaohGold/10 p-2 w-12 h-12 rounded-xl flex items-center justify-center mb-6">
                                <i class="fa-solid fa-eye text-pharaohGold text-xl"></i>
                            </div>
                            <h2 class="text-3xl md:text-4xl font-bold mb-6 font-serif tracking-widest text-white leading-tight uppercase text-nowrap">關於戀財<br><span class="text-pharaohGold text-base md:text-lg tracking-[0.3em] uppercase font-sans font-bold">About Scatter n Gold</span></h2>
                            <p class="text-textGray text-sm md:text-base leading-relaxed">「戀財娛樂館」致力於打造全台最具有敘事性的娛樂空間。我們將「法老王的祕寶」作為核心主題，目標客群瞄準城市精英。</p>
                        </div>
                        <div class="lg:w-1/2 grid grid-cols-2 gap-4">
                            <div class="bg-nileTeal rounded-[20px] overflow-hidden h-48 md:h-64 hover-scale border border-white/5 shadow-2xl">
                                <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover" alt="Ambience">
                            </div>
                            <div class="bg-nileTeal rounded-[20px] overflow-hidden h-48 md:h-64 mt-6 md:mt-8 hover-scale border border-white/5 shadow-2xl">
                                <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover" alt="Service">
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <footer class="px-6 py-10 md:px-10 border-t border-nileTeal bg-mainBg flex flex-col md:flex-row justify-between items-center gap-8 relative z-50">
                <div class="flex flex-col items-center md:items-start text-center md:text-left">
                    <div class="flex items-center gap-2 mb-4">
                        <img src="https://scatterngold.vercel.app/images/Brand.png" alt="Logo" class="h-8 grayscale opacity-60">
                        <span class="text-lg font-bold text-textGray font-serif uppercase tracking-widest ml-2">Scatter n Gold</span>
                    </div>
                </div>
            </footer>
        </div>

        <!-- 破框裝飾牛 -->
        <div class="absolute -right-[40px] md:-right-[80px] xl:-right-[180px] bottom-[10%] md:bottom-[12%] xl:bottom-[15%] w-[200px] md:w-[350px] xl:w-[500px] z-40 pointer-events-none hidden md:block drop-shadow-[0_30px_40px_rgba(0,0,0,1)]">
             <img src="https://images.unsplash.com/photo-1570042225831-d98fa7577f1e?auto=format&fit=crop&w=500&q=80" alt="Bull" class="w-full filter brightness-75 contrast-125 sepia-[.2] hue-rotate-[-20deg] rounded-3xl mix-blend-lighten" style="clip-path: polygon(0 0, 100% 0, 100% 80%, 80% 100%, 0 100%);">
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const reveals = document.querySelectorAll('.reveal');
            const revealOnScroll = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });
            reveals.forEach(reveal => revealOnScroll.observe(reveal));
        });
    </script>
</body>
</html>
